services:
  slack-bot:
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: mnemo-slack-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mnemo-net
    restart: always

volumes:
  caddy_data:
  caddy_config:
