
services:
  ollama:
    restart: always

  qdrant:
    restart: always

  app:
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - chatbot-net

volumes:
  caddy_data:
  caddy_config:
